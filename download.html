<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>下载中 - 百日炼兵计划</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #0a0a1a;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            text-align: center;
            padding: 40px;
        }
        .icon { font-size: 80px; margin-bottom: 24px; }
        h1 { font-size: 28px; margin-bottom: 16px; color: #ffd700; }
        p { color: #b8c5d6; font-size: 16px; }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,215,0,0.2);
            border-top-color: #ffd700;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 24px auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">📚</div>
        <h1>正在准备下载...</h1>
        <div class="spinner"></div>
        <p>感谢您的参与，资料马上就来</p>
    </div>
    <script>
        // 自动触发PDF下载
        window.onload = function() {
            const link = document.createElement('a');
            link.href = '顶级游资涨停宝典.pdf';
            link.download = '顶级游资涨停宝典.pdf';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            
            // 3秒后跳转回首页
            setTimeout(function() {
                window.location.href = 'index.html';
            }, 3000);
        };
    </script>
</body>
</html>
